name: Apply ASK.CAMERA v10.2.0

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-v102.yml'
      - '.github/v102/**'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reassemble patch runner
        run: cat .github/v102/part* > /tmp/apply_v10_2.py
      - name: Apply release patch
        run: python /tmp/apply_v10_2.py
      - name: Validate backend syntax
        run: node --check server.js
      - name: Validate complete frontend
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('public/index.html').read_text()
          assert html.rstrip().endswith('</html>')
          assert 'v10.2.0' in html
          assert 'beingConnection1' in html and 'beingConnection2' in html and 'beingConnection3' in html
          assert 'The AI That Connects Humans.' in html
          assert 'Discover what this image connects you to.' in html
          server = Path('server.js').read_text()
          assert 'validateBeingConnections' in server
          assert 'connection1' in server and 'connection2' in server and 'connection3' in server
          print(len(html), len(server))
          PY
      - name: Commit release
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add public/index.html server.js supabase/migrations/20260721_add_human_connection_keywords.sql
          git rm -r .github/v102 .github/workflows/apply-v102.yml
          git commit -m 'Align wording and add HUMAN connection keywords'
          git push origin main
