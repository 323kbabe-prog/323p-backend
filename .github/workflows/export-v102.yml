name: Export ASK.CAMERA v10.2.0 files

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/export-v102.yml'

permissions:
  contents: write

jobs:
  export:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare complete text files
        run: |
          mkdir -p export
          cp public/index.html export/public-index-v10.2.0.txt
          cp server.js export/server-v10.2.0.txt
          cp supabase/migrations/20260721_add_human_connection_keywords.sql export/supabase-migration-v10.2.0.txt
          test "$(tail -n 1 export/public-index-v10.2.0.txt)" = '</html>'
      - uses: actions/upload-artifact@v4
        with:
          name: ask-camera-v10.2.0-complete-files
          path: export/*.txt
          retention-days: 30
      - name: Remove exporter
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/export-v102.yml
          git commit -m 'Remove temporary v10.2.0 exporter'
          git push origin main
