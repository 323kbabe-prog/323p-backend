name: Correct ASK.CAMERA v10.2.0

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-v102.yml'
      - '.github/v102-fix.py'

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python .github/v102-fix.py
      - run: node --check server.js
      - name: Validate corrections
        run: |
          python - <<'PY'
          from pathlib import Path
          s=Path('server.js').read_text()
          assert 'required.slice(4)' in s
          assert 'connection1, connection2, connection3, connection1' not in s
          assert 'const required = [photo, name, best_current_choice, category, word1, word2, word3, connection1, connection2, connection3];' in s
          assert 'name, bio, category, word1, word2, word3, connection1, connection2, connection3' in s
          PY
      - name: Commit correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add server.js
          git rm .github/v102-fix.py .github/workflows/fix-v102.yml
          git commit -m 'Fix HUMAN connection validation paths'
          git push origin main
